name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" ruff mypy
      - name: Lint (ruff)
        run: ruff check core pipelines evals tests
      - name: Types (mypy)
        run: mypy core pipelines evals
      - name: Test (pytest)
        run: python -m pytest -q
      - name: Evals reproduce offline (dry-run, zero cost)
        run: python evals/run_evals.py --claim verify

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
