<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="430" fill="#0A0A0B"/>
  <text x="32" y="42" fill="#F0F2F5" font-size="22" font-weight="700">Quorum</text>
  <text x="120" y="42" fill="#8A9099" font-size="14">task-aware agent orchestrator</text>

  <!-- flow row -->
  <g font-size="13" font-weight="600">
    <!-- dispatcher -->
    <rect x="32" y="80" width="150" height="62" rx="10" fill="#111214" stroke="#00C9B1" stroke-opacity="0.5"/>
    <text x="107" y="106" fill="#F0F2F5" text-anchor="middle">Dispatcher</text>
    <text x="107" y="124" fill="#8A9099" font-size="11" font-weight="400" text-anchor="middle">picks the pipeline</text>

    <!-- pipeline -->
    <rect x="222" y="80" width="190" height="62" rx="10" fill="#111214" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="317" y="106" fill="#F0F2F5" text-anchor="middle">Code-review pipeline</text>
    <text x="317" y="124" fill="#8A9099" font-size="11" font-weight="400" text-anchor="middle">finders + K skeptics</text>

    <!-- orchestrator -->
    <rect x="452" y="80" width="170" height="62" rx="10" fill="#111214" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="537" y="106" fill="#F0F2F5" text-anchor="middle">Orchestrator</text>
    <text x="537" y="124" fill="#8A9099" font-size="11" font-weight="400" text-anchor="middle">fan-out · retry · degrade</text>

    <!-- router -->
    <rect x="662" y="80" width="150" height="62" rx="10" fill="#111214" stroke="#00C9B1" stroke-opacity="0.5"/>
    <text x="737" y="106" fill="#F0F2F5" text-anchor="middle">Router</text>
    <text x="737" y="124" fill="#8A9099" font-size="11" font-weight="400" text-anchor="middle">cheapest tier + fallback</text>
  </g>

  <!-- arrows -->
  <g stroke="#00C9B1" stroke-opacity="0.6" stroke-width="2" fill="none" marker-end="url(#a)">
    <line x1="182" y1="111" x2="218" y2="111"/>
    <line x1="412" y1="111" x2="448" y2="111"/>
    <line x1="622" y1="111" x2="658" y2="111"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00C9B1" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- tiers -->
  <g font-size="12" font-weight="600">
    <rect x="662" y="180" width="68" height="34" rx="8" fill="#16181C"/><text x="696" y="202" fill="#6B8CFF" text-anchor="middle">DeepSeek</text>
    <rect x="662" y="222" width="68" height="34" rx="8" fill="#16181C"/><text x="696" y="244" fill="#4ECDC4" text-anchor="middle">Haiku</text>
    <rect x="744" y="180" width="68" height="34" rx="8" fill="#16181C"/><text x="778" y="202" fill="#A8C4FF" text-anchor="middle">Sonnet</text>
    <rect x="744" y="222" width="68" height="34" rx="8" fill="#16181C"/><text x="778" y="244" fill="#D4A8FF" text-anchor="middle">Opus</text>
  </g>
  <line x1="737" y1="142" x2="737" y2="176" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- tracing bus -->
  <rect x="32" y="300" width="780" height="50" rx="10" fill="#0E1412" stroke="#00C9B1" stroke-opacity="0.35"/>
  <text x="52" y="330" fill="#00C9B1" font-size="13" font-weight="700">Tracing (SQLite)</text>
  <text x="190" y="330" fill="#8A9099" font-size="12">every call → prompt · tier decision · tokens · cost · latency · retries · outcome</text>
  <g stroke="#00C9B1" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="3 4">
    <line x1="107" y1="142" x2="107" y2="300"/>
    <line x1="317" y1="142" x2="317" y2="300"/>
    <line x1="537" y1="142" x2="537" y2="300"/>
  </g>

  <!-- UI -->
  <rect x="612" y="372" width="200" height="40" rx="10" fill="#111214" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="712" y="397" fill="#F0F2F5" font-size="13" font-weight="600" text-anchor="middle">Trace UI (Next.js)</text>
  <line x1="420" y1="350" x2="420" y2="392" stroke="#00C9B1" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="420" y1="392" x2="608" y2="392" stroke="#00C9B1" stroke-opacity="0.3" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
